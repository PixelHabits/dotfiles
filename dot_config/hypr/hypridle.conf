# ~/.config/hypr/hypridle.conf
general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on  # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3
}

# 1. Dim the screen after 3 minutes of inactivity
listener {
    timeout = 180                                # 2.5min.
    on-timeout = brightnessctl -s set 10%        # Save current brightness and set to 10%, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # Restore previous brightness
}

# turn off keyboard backlight, comment out this section if you dont have a keyboard backlight.
listener { 
    timeout = 180                                          # 2.5min.
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0 # turn off keyboard backlight.
    on-resume = brightnessctl -rd rgb:kbd_backlight        # turn on keyboard backlight.
}

# Lock the screen after 5 minutes
listener {
    timeout = 300                                 # 5min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

# Turn off the display entirely after 5.5 minutes
listener {
    timeout = 330                                                     # 5.5min
    on-timeout = hyprctl dispatch dpms off                            # screen off when timeout has passed
    on-resume = hyprctl dispatch dpms on && brightnessctl -r          # screen on when activity is detected after timeout has fired.
}

# Put the laptop to sleep after 30 minutes to save battery
listener {
    timeout = 3600                                # 30min
    on-timeout = systemctl suspend                # suspend pc
}
