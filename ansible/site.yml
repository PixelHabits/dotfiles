---
- name: Workstation bootstrap
  hosts: localhost
  connection: local
  become: false

  vars:
    # ── XDG Base Directories ────────────────────────────────
    user_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"
    xdg_config_home: "{{ user_home }}/.config"
    xdg_cache_home: "{{ user_home }}/.cache"
    xdg_data_home: "{{ user_home }}/.local/share"
    xdg_state_home: "{{ user_home }}/.local/state"
    local_bin: "{{ user_home }}/.local/bin"

    xdg_dirs:
      - "{{ xdg_config_home }}"
      - "{{ xdg_cache_home }}"
      - "{{ xdg_data_home }}"
      - "{{ xdg_state_home }}"
      - "{{ local_bin }}"
      - "{{ xdg_state_home }}/zsh"
      - "{{ xdg_cache_home }}/zsh"

    # ── XDG environment for subprocesses ────────────────────
    # Mirrors zshenv.d/06-xdg-apps.zsh so Ansible operations
    # and shell runtime use identical paths. When adding a new
    # redirect in 06-xdg-apps.zsh, add it here too.
    xdg_environment:
      XDG_CONFIG_HOME: "{{ xdg_config_home }}"
      XDG_CACHE_HOME: "{{ xdg_cache_home }}"
      XDG_DATA_HOME: "{{ xdg_data_home }}"
      XDG_STATE_HOME: "{{ xdg_state_home }}"
      CARGO_HOME: "{{ xdg_data_home }}/cargo"
      RUSTUP_HOME: "{{ xdg_data_home }}/rustup"
      GOPATH: "{{ xdg_data_home }}/go"
      GOMODCACHE: "{{ xdg_cache_home }}/go/mod"
      BUN_INSTALL: "{{ xdg_data_home }}/bun"
      DOTNET_CLI_HOME: "{{ xdg_data_home }}/dotnet"
      NPM_CONFIG_CACHE: "{{ xdg_cache_home }}/npm"
      GNUPGHOME: "{{ xdg_data_home }}/gnupg"

    # ── Oh My Zsh ───────────────────────────────────────────
    omz_dir: "{{ xdg_data_home }}/oh-my-zsh"
    p10k_dir: "{{ omz_dir }}/custom/themes/powerlevel10k"

    # ── Packages ────────────────────────────────────────────
    common_packages:
      - zsh
      - btop
      - fzf
      - ripgrep
      - fastfetch
      - eza
      - gh
      - zoxide
      - tmux
      - unzip
      - bat
      - zip

    hardware_packages:
      Linux:
        - dosfstools # /boot EFI (fwupd)
        - exfatprogs # USB Flash Drives
        - fwupd
        - ntfs-3g # Windows External Drives
        - udisks2
        - udisks2-btrfs # BTRFS filesystems

    distro_packages:
      Archlinux:
        - bun
        - fd
        - man-db
        - ghostty-terminfo
        - ufw
        - uv
      Ubuntu:
        - neovim
        - fd-find
        - man-db
        - ufw
      Fedora:
        - neovim
        - fd-find
        - man-db
        - ghostty-terminfo
        - ufw
        - uv
      Darwin:
        - neovim
        - fd
        - fnm
        - rustup
        - uv

    aur_packages:
      - neovim-git

    macos_casks:
      - 1password
      - 1password-cli
      - docker
      - ghostty
      - font-jetbrains-mono-nerd-font
      - helium-browser

  environment: "{{ xdg_environment }}"

  pre_tasks:
    - name: Fail on unsupported OS
      ansible.builtin.fail:
        msg: >-
          Unsupported: {{ ansible_facts['distribution'] }}
          ({{ ansible_facts['os_family'] }}).
          Supported: Archlinux, Ubuntu, Fedora, macOS.
      when: >-
        ansible_facts['distribution'] not in distro_packages
        and ansible_facts['os_family'] != 'Darwin'

    # ── Bare Metal detection ──────────────────────────────
    - name: Detect if running on bare metal (not a VM/WSL)
      ansible.builtin.set_fact:
        is_bare_metal: "{{ ansible_facts['virtualization_role'] != 'guest' }}"

    - name: Append hardware packages to distro_packages (Linux Bare Metal only)
      ansible.builtin.set_fact:
        distro_packages: >-
          {{ distro_packages | combine({
               ansible_facts['distribution']: distro_packages[ansible_facts['distribution']] + hardware_packages['Linux']
             })
          }}
      when: is_bare_metal and ansible_facts['system'] == 'Linux'

    # ── Nvidia GPU detection ──────────────────────────────
    #   Blackwell+ (RTX 50xx)          → nvidia-open-beta-dkms
    #   Turing–Ada (RTX 20–40, GTX 16) → nvidia-beta-dkms
    #   Pascal (GTX 10xx)              → nvidia-580xx-dkms
    - name: Detect Nvidia GPU
      ansible.builtin.shell: |
        lspci | grep -iE 'vga|3d' | grep -i nvidia
      register: nvidia_detect
      changed_when: false
      failed_when: false
      when: ansible_facts['system'] == 'Linux'

    - name: Set Nvidia generation
      ansible.builtin.set_fact:
        nvidia_generation: >-
          {%- set gpu = nvidia_detect.stdout | default('') -%}
          {%- if gpu is search('RTX [5-9]0') -%}blackwell
          {%- elif gpu is search('RTX [2-4]0|GTX 16') -%}turing_ada
          {%- elif gpu is search('GTX 10') -%}pascal
          {%- else -%}none
          {%- endif -%}

    - name: Build Nvidia package list and append to AUR packages
      vars:
        nvidia_driver_map:
          blackwell:
            - linux-headers
            - nvidia-open-beta-dkms
            - nvidia-utils-beta
            - nvidia-settings-beta
            - libva-nvidia-driver
          turing_ada:
            - linux-headers
            - nvidia-beta-dkms
            - nvidia-utils-beta
            - nvidia-settings-beta
            - libva-nvidia-driver
          pascal:
            - linux-headers
            - nvidia-580xx-dkms
            - nvidia-580xx-utils
          none: []
      ansible.builtin.set_fact:
        has_nvidia: "{{ nvidia_generation != 'none' }}"
        nvidia_packages: "{{ nvidia_driver_map[nvidia_generation] }}"
        aur_packages: "{{ aur_packages + nvidia_driver_map[nvidia_generation] }}"

  roles:
    - { role: base, tags: [base, cli] }
    - { role: zsh, tags: [zsh, cli] }
    - { role: hyprland, tags: [desktop] }
    - { role: dev, tags: [dev] }
