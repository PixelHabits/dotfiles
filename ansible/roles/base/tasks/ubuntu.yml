# ── Binary name fixups ──────────────────────────────────────
# Runs after Phase 3 so the binaries exist to symlink.

- name: Symlink Ubuntu binaries to standard names
  become: true
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: /usr/bin/fdfind, dest: /usr/local/bin/fd }
    - { src: /usr/bin/batcat, dest: /usr/local/bin/bat }
