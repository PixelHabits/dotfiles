# ════════════════════════════════════════════════════════════
# Phase 1: XDG directories — before anything writes to disk
# ════════════════════════════════════════════════════════════

- name: Create XDG base directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ xdg_dirs }}"

- name: Create desktop user directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ user_desktop_dirs }}"
  when: chezmoi_desktop != 'none'

# ════════════════════════════════════════════════════════════
# Phase 2: Infrastructure — package managers that need setup
# ════════════════════════════════════════════════════════════

- name: Include Arch infrastructure (yay)
  ansible.builtin.include_tasks: arch.yml
  when: ansible_facts['distribution'] == 'Archlinux'

# Note: Homebrew is a prerequisite on macOS (needed to install
# chezmoi itself). Ansible does not bootstrap or manage it.

# ════════════════════════════════════════════════════════════
# Phase 3: Package installation — all platforms
# ════════════════════════════════════════════════════════════

- name: Install packages (pacman)
  become: true
  community.general.pacman:
    name: "{{ common_packages + distro_packages['Archlinux'] }}"
    state: present
    update_cache: true
  when: ansible_facts['distribution'] == 'Archlinux'

- name: Install packages (apt)
  become: true
  ansible.builtin.apt:
    name: "{{ common_packages + distro_packages['Ubuntu'] }}"
    state: present
    update_cache: true
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install packages (dnf)
  become: true
  ansible.builtin.dnf:
    name: "{{ common_packages + distro_packages['Fedora'] }}"
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install CLI tools (Homebrew formulae)
  community.general.homebrew:
    name: "{{ common_packages + distro_packages['Darwin'] }}"
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install desktop apps (Homebrew casks)
  community.general.homebrew_cask:
    name: "{{ macos_casks }}"
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install AUR packages
  become: true
  become_user: aur_builder
  ansible.builtin.command: >-
    yay -S --needed --noconfirm {{ item }}
  loop: "{{ aur_packages }}"
  register: yay_install
  changed_when: "'there is nothing to do' not in yay_install.stdout"
  when: >-
    ansible_facts['distribution'] == 'Archlinux'
    and aur_packages | length > 0

# ════════════════════════════════════════════════════════════
# Phase 4: System services
# ════════════════════════════════════════════════════════════

- name: Enable sshd
  become: true
  ansible.builtin.systemd:
    name: sshd
    enabled: true
  when: ansible_facts['system'] == 'Linux'

- name: List battery power supply devices
  ansible.builtin.find:
    paths: /sys/class/power_supply
    file_type: link
    patterns: "BAT*"
    recurse: false
  register: battery_devices
  changed_when: false
  failed_when: false
  when:
    - ansible_facts['system'] == 'Linux'
    - ansible_facts['service_mgr'] | default('') == 'systemd'

- name: Set battery threshold device
  ansible.builtin.set_fact:
    battery_device: >-
      {{ ((battery_devices.files | sort(attribute='path') | first).path | basename) }}
  when:
    - ansible_facts['system'] == 'Linux'
    - ansible_facts['service_mgr'] | default('') == 'systemd'
    - battery_devices is defined and battery_devices.files | default([]) | length > 0

- name: Detect battery charge threshold support
  ansible.builtin.stat:
    path: "/sys/class/power_supply/{{ battery_device }}/charge_control_end_threshold"
  register: battery_threshold_probe
  changed_when: false
  when:
    - ansible_facts['system'] == 'Linux'
    - ansible_facts['service_mgr'] | default('') == 'systemd'
    - battery_device is defined

- name: Install battery threshold systemd unit
  become: true
  ansible.builtin.template:
    src: battery-threshold.service.j2
    dest: /etc/systemd/system/battery-threshold.service
    owner: root
    group: root
    mode: "0644"
  when:
    - ansible_facts['system'] == 'Linux'
    - ansible_facts['service_mgr'] | default('') == 'systemd'
    - battery_device is defined
    - battery_threshold_probe is defined and battery_threshold_probe.stat.exists | default(false)

- name: Enable battery threshold service
  become: true
  ansible.builtin.systemd:
    name: battery-threshold.service
    daemon_reload: true
    enabled: true
  when:
    - ansible_facts['system'] == 'Linux'
    - ansible_facts['service_mgr'] | default('') == 'systemd'
    - battery_device is defined
    - battery_threshold_probe is defined and battery_threshold_probe.stat.exists | default(false)

# ════════════════════════════════════════════════════════════
# Phase 5: Post-install fixups
# ════════════════════════════════════════════════════════════

- name: Include Ubuntu post-install fixups
  ansible.builtin.include_tasks: ubuntu.yml
  when: ansible_facts['distribution'] == 'Ubuntu'

# ════════════════════════════════════════════════════════════
# Phase 6: Ghostty terminfo (distros without a package)
# ════════════════════════════════════════════════════════════
# Arch and Fedora get ghostty-terminfo via package manager
# in Phase 3. macOS gets it via the full ghostty cask.
# Ubuntu doesn't package it, so compile from vendored source.
# Ensures SSH servers accept Ghostty terminal connections.

- name: Check for xterm-ghostty terminfo
  ansible.builtin.command: infocmp xterm-ghostty
  register: ghostty_terminfo_check
  changed_when: false
  failed_when: false
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Compile ghostty terminfo
  ansible.builtin.command: tic -x {{ role_path }}/../../files/ghostty.terminfo
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ghostty_terminfo_check.rc != 0
